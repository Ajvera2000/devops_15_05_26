version: '3.8'

services:
  angelo:
    image: ghcr.io/ajvera2000/devops_15_05_26:latest # <-- Cambiado al paquete real en minúsculas
    # Se eliminó por completo el bloque 'build:' para evitar el error en Docker Swarm
    networks:
      - traefik-public
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.angelo.entrypoints=http"
        - "traefik.http.routers.angelo.rule=Host(`angelo.byronrm.com`)"
        - "traefik.http.middlewares.angelo-https-redirect.redirectscheme.scheme=https"
        - "traefik.http.routers.angelo.middlewares=angelo-https-redirect"
        - "traefik.http.routers.angelo-secure.entrypoints=https"
        - "traefik.http.routers.angelo-secure.rule=Host(`angelo.byronrm.com`)"
        - "traefik.http.routers.angelo-secure.tls=true"
        - "traefik.http.routers.angelo-secure.tls.certresolver=http"
        - "traefik.http.routers.angelo-secure.service=angelo"
        - "traefik.http.services.angelo.loadbalancer.server.port=5000" # Asegúrate de que tu app escuche en el puerto 5000
        - "traefik.docker.network=traefik-public"

networks:
  traefik-public:
    external: true